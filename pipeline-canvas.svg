<svg viewBox="0 0 980 460" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, sans-serif">
  <defs>
    <linearGradient id="hdr" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0f6cbd"/><stop offset="1" stop-color="#0a4f8a"/>
    </linearGradient>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000" flood-opacity="0.18"/>
    </filter>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#5b6370"/>
    </marker>
    <marker id="arrFail" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#c43e3e"/>
    </marker>
  </defs>

  <!-- canvas background -->
  <rect width="980" height="460" fill="#f3f4f6"/>
  <!-- ADF top bar -->
  <rect width="980" height="42" fill="url(#hdr)"/>
  <text x="18" y="27" fill="#fff" font-size="15" font-weight="600">Azure Data Factory · PL_Ingest_Metadata_Driven</text>
  <text x="850" y="27" fill="#cfe3f5" font-size="11">▷ Debug   ⤴ Publish</text>

  <!-- dotted grid -->
  <g stroke="#e3e6ea" stroke-width="1">
    <line x1="0" y1="100" x2="980" y2="100"/><line x1="0" y1="180" x2="980" y2="180"/>
    <line x1="0" y1="260" x2="980" y2="260"/><line x1="0" y1="340" x2="980" y2="340"/>
  </g>

  <!-- Activity: Lookup Control -->
  <g filter="url(#sh)">
    <rect x="30" y="120" width="150" height="58" rx="6" fill="#fff" stroke="#cbd2da"/>
    <rect x="30" y="120" width="150" height="20" rx="6" fill="#eaf3fb"/>
    <text x="40" y="134" font-size="10" fill="#0f6cbd" font-weight="600">Lookup</text>
    <text x="40" y="158" font-size="11" fill="#1b1f27">Lookup_Control</text>
    <text x="40" y="172" font-size="9" fill="#6b7280">control.IngestionMetadata</text>
  </g>

  <!-- ForEach container -->
  <g filter="url(#sh)">
    <rect x="250" y="80" width="470" height="240" rx="8" fill="#fafbfc" stroke="#9fb6cc" stroke-dasharray="5 3"/>
    <rect x="250" y="80" width="470" height="22" rx="8" fill="#e7eef5"/>
    <text x="262" y="95" font-size="11" fill="#0f6cbd" font-weight="600">ForEach_Entity  (batchCount 6, parallel)</text>
  </g>

  <!-- inside ForEach: Lookup Watermark -->
  <g filter="url(#sh)">
    <rect x="270" y="120" width="130" height="50" rx="6" fill="#fff" stroke="#cbd2da"/>
    <text x="280" y="138" font-size="9" fill="#0f6cbd" font-weight="600">Lookup</text>
    <text x="280" y="156" font-size="10" fill="#1b1f27">Lookup_Watermark</text>
  </g>
  <!-- Copy -->
  <g filter="url(#sh)">
    <rect x="430" y="120" width="135" height="50" rx="6" fill="#fff" stroke="#cbd2da"/>
    <text x="440" y="138" font-size="9" fill="#107c10" font-weight="600">Copy data</text>
    <text x="440" y="156" font-size="10" fill="#1b1f27">Copy_Source→Lake</text>
  </g>
  <!-- Update WM -->
  <g filter="url(#sh)">
    <rect x="595" y="120" width="105" height="50" rx="6" fill="#fff" stroke="#cbd2da"/>
    <text x="605" y="138" font-size="9" fill="#0f6cbd" font-weight="600">Stored Proc</text>
    <text x="605" y="156" font-size="10" fill="#1b1f27">Update_WM</text>
  </g>
  <!-- Dead letter (fail path) -->
  <g filter="url(#sh)">
    <rect x="430" y="240" width="135" height="50" rx="6" fill="#fff" stroke="#e3b1b1"/>
    <text x="440" y="258" font-size="9" fill="#c43e3e" font-weight="600">Stored Proc</text>
    <text x="440" y="276" font-size="10" fill="#1b1f27">Log_DeadLetter</text>
  </g>

  <!-- Databricks transform -->
  <g filter="url(#sh)">
    <rect x="790" y="120" width="160" height="58" rx="6" fill="#fff" stroke="#cbd2da"/>
    <rect x="790" y="120" width="160" height="20" rx="6" fill="#fdecea"/>
    <text x="800" y="134" font-size="10" fill="#d13438" font-weight="600">Notebook</text>
    <text x="800" y="158" font-size="11" fill="#1b1f27">Databricks Transform</text>
    <text x="800" y="172" font-size="9" fill="#6b7280">Bronze → Silver → Gold</text>
  </g>

  <!-- connectors -->
  <line x1="180" y1="149" x2="268" y2="145" stroke="#5b6370" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="400" y1="145" x2="428" y2="145" stroke="#5b6370" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="565" y1="145" x2="593" y2="145" stroke="#5b6370" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- fail path -->
  <path d="M497,170 L497,238" stroke="#c43e3e" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrFail)"/>
  <text x="503" y="210" font-size="9" fill="#c43e3e">on failure</text>
  <!-- foreach -> databricks -->
  <line x1="720" y1="149" x2="788" y2="149" stroke="#5b6370" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- legend -->
  <text x="30" y="380" font-size="11" font-weight="600" fill="#1b1f27">Flow</text>
  <text x="30" y="400" font-size="10.5" fill="#444">Read control table → loop entities in parallel → per entity: get watermark, copy changed rows to ADLS (Parquet/Snappy),</text>
  <text x="30" y="416" font-size="10.5" fill="#444">advance watermark (or dead-letter on failure) → after all entities, run Databricks transform to build the Gold model.</text>
  <text x="30" y="438" font-size="9.5" fill="#8a8f99">Retry 3× exponential · DynamicRange partitioned copy · validateDataConsistency on · ManagedIdentity auth (no secrets in pipeline)</text>
</svg>
